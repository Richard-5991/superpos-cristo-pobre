<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <!-- Meta tag crítico para responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Cristo Pobre</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #2563eb;
            --primary-gradient: linear-gradient(135deg, #2563eb, #3b82f6);
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #f8fafc;
            position: relative;
            /* Permitir scroll en móviles si el teclado se abre */
            overflow-y: auto;
            padding: 20px 0;
        }

        /* Luz decorativa optimizada para no crear scroll horizontal */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(37,99,235,0.2), transparent 70%);
            top: -50px;
            left: -50px;
            z-index: 0;
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            z-index: 1;
        }

        .card {
            border: none;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header .icon-box {
            width: 65px;
            height: 65px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            transition: all 0.5s ease;
        }

        h2 {
            font-weight: 800;
            letter-spacing: -0.5px;
            font-size: 1.5rem; /* Ajustado para móvil */
        }

        .form-label {
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        .input-group {
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            transition: all 0.25s ease;
            background: #fff;
        }

        .input-group:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: #94a3b8;
        }

        .form-control {
            border: none;
            padding: 12px 10px;
            font-size: 16px; /* Evita el zoom automático en iOS */
        }

        .form-control:focus {
            box-shadow: none;
            background-color: #fff;
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .alert {
            border-radius: 12px;
            font-size: 0.85rem;
            border: none;
        }

        /* Ajustes para tablets y PC */
        @media (min-width: 768px) {
            .login-container { max-width: 420px; }
            h2 { font-size: 1.75rem; }
            .login-header .icon-box { width: 75px; height: 75px; }
            body::before { width: 600px; height: 600px; }
        }
    </style>
</head>

<body>

<div class="login-container">

    <!-- Bloque de Alertas -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm mb-4 border-start border-danger border-4 bg-white text-dark" role="alert">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-shield-halved me-2 text-danger"></i>
                        <div>{{ message }}</div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="card p-4 p-sm-5">
        <div class="text-center login-header">
            <div class="icon-box shadow-sm">
                <i class="fas fa-fingerprint fa-2x"></i>
            </div>
            <h2 class="text-dark mb-1">Bienvenido</h2>
            <p class="text-muted small mb-4">Sistema de Gestión <strong>Cristo Pobre</strong></p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold text-uppercase">Identificador</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-user-circle"></i>
                    </span>
                    <input type="text" name="username" class="form-control" placeholder="Usuario" required autocomplete="off">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-uppercase">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Acceder <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>
    </div>

    <div class="text-center mt-4">
        <p class="text-white-50 small mb-1">
            &copy; 2024 Cristo Pobre
        </p>
        <span class="badge bg-white bg-opacity-10 text-white-50 fw-normal" style="font-size: 0.7rem;">
            Versión 2.0 - Seguridad Encriptada
        </span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
