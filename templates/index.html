{% extends "base.html" %} 
{% block content %}
<style>
  /* Contenedor de tabla con scroll táctil mejorado */
  .tabla-container {
    height: 350px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  
  .card-resumen {
    border-left: 5px solid #0d6efd !important;
  }
  
  .bg-factura {
    background-color: #f4f7fa;
  }

  /* Ajustes para inputs en móviles */
  @media (max-width: 768px) {
    .tabla-container {
      height: 300px;
    }
    .fs-mobile-small {
      font-size: 0.85rem !important;
    }
    .btn-lg-mobile {
      padding: 1rem !important;
      font-size: 1rem !important;
    }
  }

  /* Suavizado para el bloqueo de sección */
  #seccion-venta {
    transition: all 0.3s ease-in-out;
  }
</style>

<div class="container-fluid py-2 py-md-3 bg-factura" style="min-height: 90vh">
  <!-- SECCIÓN DATOS CLIENTE -->
  <div class="card border-0 shadow-sm mb-3" style="border-radius: 12px">
    <div class="card-body py-3 px-3 px-md-4">
      <div class="row g-2 g-md-3 align-items-center">
        <div class="col-12 col-md-3">
          <label class="text-muted small fw-bold text-uppercase mb-1" style="font-size: 0.7rem">Cédula/RUC</label>
          <div class="input-group input-group-sm shadow-sm rounded">
            <span class="input-group-text bg-white border-0"><i class="fas fa-id-card text-primary"></i></span>
            <input type="tel" id="factura_cedula" class="form-control fw-bold border-0" placeholder="1234567890" maxlength="13" autocomplete="off" disabled oninput="validarYConsultar(this)" onkeypress="if (event.key === 'Enter') consultarCliente();" />
          </div>
        </div>
        <div class="col-12 col-md-4">
          <label class="text-muted small fw-bold text-uppercase mb-1" style="font-size: 0.7rem">Cliente</label>
          <input type="text" id="factura_nombre" class="form-control form-control-sm bg-light border-0 fw-bold" placeholder="Ingrese identificación..." readonly disabled style="cursor: not-allowed" />
        </div>
        <div class="col-12 col-md-5">
          <label class="text-muted small fw-bold text-uppercase mb-1" style="font-size: 0.7rem">Dirección</label>
          <input type="text" id="factura_direccion" class="form-control form-control-sm bg-light border-0" placeholder="Esperando cliente..." readonly disabled style="cursor: not-allowed" />
        </div>
      </div>
    </div>
  </div>

  <!-- SECCIÓN PRODUCTOS Y TOTALES -->
  <div id="seccion-venta" style="opacity: 0.4; pointer-events: none">
    <div class="row g-3">
      <!-- Tabla de Productos -->
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm" style="border-radius: 12px">
          <div class="card-header bg-white border-0 py-3 d-flex flex-column flex-sm-row justify-content-between align-items-center gap-2">
            <h6 class="mb-0 fw-bold text-dark">
              <i class="fas fa-shopping-cart me-2 text-primary"></i>Productos
            </h6>
            <button type="button" class="btn btn-primary btn-sm rounded-pill px-4 fw-bold shadow-sm w-100 w-sm-auto" onclick="abrirModalProductos()">
              <i class="fas fa-search me-1"></i> BUSCAR PRODUCTO
            </button>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive tabla-container">
              <table class="table table-hover align-middle mb-0">
                <thead class="bg-light sticky-top">
                  <tr class="small text-uppercase text-muted" style="font-size: 0.7rem">
                    <th class="ps-3 py-3">Descripción</th>
                    <th class="text-center">Cant.</th>
                    <th>P. Unit</th>
                    <th>Total</th>
                    <th class="text-end pe-3">Acción</th>
                  </tr>
                </thead>
                <tbody id="tabla-factura" class="small fw-bold"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Resumen de Pago -->
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm card-resumen" style="border-radius: 12px">
          <div class="card-body p-3 p-md-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <span class="text-muted fw-bold">SUBTOTAL:</span>
              <span class="fw-bold fs-5 text-dark" id="subtotal-bruto">$ 0.00</span>
            </div>

            <div class="p-3 rounded-3 mb-3 bg-light border">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="small fw-bold text-dark"><i class="fas fa-tag me-1 text-danger"></i> DESC. ($)</label>
                <input type="text" inputmode="decimal" id="descuento-global" class="form-control form-control-sm text-end fw-bold border-0 shadow-sm" style="width: 90px; border-radius: 8px" value="0.00" oninput="recalcularTotales();validarNoNegativo(this);" />
              </div>
              <div id="contenedor-motivo" class="mt-2" style="display: none">
                <input type="text" id="motivo-descuento" class="form-control form-control-sm border-0 shadow-sm" placeholder="¿POR QUÉ EL DESC?" style="font-size: 0.75rem; text-transform: uppercase;" />
              </div>
            </div>

            <div class="text-center py-3 mb-3 rounded-3 bg-dark text-white shadow">
              <span class="small text-uppercase text-white-50 d-block mb-1" style="font-size: 0.65rem; letter-spacing: 1px">Total a Pagar</span>
              <h1 class="mb-0 fw-bold" id="total-final">$ 0.00</h1>
            </div>

            <div class="mb-3">
              <label class="small fw-bold text-muted text-uppercase mb-2 d-block">Método de Pago:</label>
              <select id="metodo-pago" class="form-select fw-bold border-2" style="border-radius: 10px">
                <option value="efectivo">💵 Efectivo</option>
                <option value="transferencia">🏦 Transferencia</option>
              </select>
            </div>

            <button class="btn btn-success btn-lg w-100 py-3 fw-bold shadow-lg btn-lg-mobile" style="border-radius: 12px" onclick="finalizarFactura()">
              <i class="fas fa-check-circle me-2"></i> FINALIZAR VENTA
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL BÚSQUEDA PRODUCTOS -->
<div class="modal fade" id="modalBusquedaProd" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 20px">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold text-dark">Seleccionar Producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-3 p-md-4">
        <div class="input-group mb-3 shadow-sm rounded-3 overflow-hidden">
          <span class="input-group-text bg-white border-0"><i class="fas fa-search text-muted"></i></span>
          <input type="text" id="input-filtrar-prod" class="form-control border-0 bg-white" placeholder="Buscar por nombre o código..." onkeyup="filtrarProductos(this.value)" />
        </div>

        <div class="list-group list-group-flush border rounded-3" id="lista-productos-modal" style="max-height: 50vh; overflow-y: auto">
          {% for p in productos %}
            {% if p.activo %}
              <button type="button" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3 px-2 px-md-3" onclick="agregarProductoAFactura('{{ p.id }}', '{{ p.codigo }}', '{{ p.nombre }}', '{{ p.precio }}')">
                <div class="small" style="max-width: 65%;">
                  <span class="fw-bold d-block text-uppercase text-dark text-truncate">{{ p.nombre }}</span>
                  <div class="d-flex flex-wrap gap-1 mt-1">
                    <span class="badge bg-primary bg-opacity-10 text-primary" style="font-size: 0.6rem">{{ p.codigo }}</span>
                    <span class="badge bg-light text-muted border" style="font-size: 0.6rem">{{ p.categoria.nombre if p.categoria else 'General' }}</span>
                  </div>
                </div>
                <div class="text-end">
                  <span class="fw-bold text-dark d-block">$ {{ "%.2f"|format(p.precio|float) }}</span>
                  {% if p.stock <= p.umbral_minimo %}
                    <span class="badge bg-danger bg-opacity-10 text-danger" style="font-size: 0.6rem"><i class="fas fa-exclamation-triangle"></i> Solo {{ p.stock }}</span>
                  {% else %}
                    <span class="text-muted" style="font-size: 0.6rem">Stock: {{ p.stock }}</span>
                  {% endif %}
                </div>
              </button>
            {% endif %}
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CLIENTE RÁPIDO -->
<div class="modal fade" id="modalClienteRapido" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 20px">
      <div class="modal-header bg-primary text-white border-0 py-3" style="border-radius: 20px 20px 0 0">
        <h6 class="modal-title fw-bold"><i class="fas fa-user-plus me-2"></i>Nuevo Cliente</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="formRegistroRapido">
          <div class="row g-3">
            <div class="col-12">
              <label class="text-muted small fw-bold text-uppercase">Cédula / RUC</label>
              <input type="text" id="reg_cedula" class="form-control bg-light fw-bold border-0" readonly />
            </div>
            <div class="col-12">
              <label class="text-muted small fw-bold text-uppercase">Nombre Completo</label>
              <input type="text" id="reg_nombre" class="form-control border-0 bg-light" placeholder="EJ: JUAN PEREZ" required oninput="this.value = this.value.toUpperCase()" />
            </div>
            <div class="col-6">
              <label class="text-muted small fw-bold text-uppercase">Teléfono</label>
              <input type="tel" id="reg_telefono" class="form-control border-0 bg-light" placeholder="099..." maxlength="10" />
            </div>
            <div class="col-6">
              <label class="text-muted small fw-bold text-uppercase">Correo</label>
              <input type="email" id="reg_correo" class="form-control border-0 bg-light" placeholder="mail@com" oninput="this.value = this.value.toLowerCase()" />
            </div>
            <div class="col-12">
              <label class="text-muted small fw-bold text-uppercase">Dirección</label>
              <input type="text" id="reg_direccion" class="form-control border-0 bg-light" placeholder="S/N" oninput="this.value = this.value.toUpperCase()" />
            </div>
          </div>
          <div class="d-grid mt-4">
            <button type="button" class="btn btn-primary btn-lg fw-bold shadow-sm rounded-3" onclick="guardarClienteRapido()">
              GUARDAR Y SELECCIONAR
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
